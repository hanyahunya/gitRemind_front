<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GitRemind - Main</title>
  <link rel="stylesheet" href="main.css" />
</head>
<body>
  <div class="container">
    <div id="username-wrapper">
      <h1 id="username">GitHub 유저명</h1>
      <!-- GitHub 유저명 입력 영역 -->
      <div id="username-input-area" style="display: none;">
        <input type="text" id="username-input" placeholder="GitHub 유저이름 입력" />
        <button id="username-submit">등록</button>
      </div>
    </div>

    <div id="status-wrapper">
      <p id="commit-status">커밋 상태 확인 중...</p>
    </div>

    <div id="grid-wrapper">
      <h2>알람 시간 설정</h2>
      <div id="time-grid"></div>
    </div>

    <button id="apply-btn">적용</button>
  </div>

  <script src="main.js"></script>
</body>
</html>
