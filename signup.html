<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GitHub 다크모드 회원가입</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: #0d1117;
      color: #c9d1d9;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 60px;
    }

    .container {
      background-color: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 30px;
      width: 380px;
      box-shadow: 0 0 5px rgba(0, 0, 0, 0.3);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 24px;
      color: #f0f6fc;
    }

    label {
      display: block;
      margin-top: 15px;
      font-weight: 600;
      font-size: 14px;
    }

    input, select {
      width: 100%;
      margin-top: 5px;
      padding: 8px;
      font-size: 14px;
      border: 1px solid #30363d;
      border-radius: 6px;
      background-color: #0d1117;
      color: #c9d1d9;
    }

    input:disabled {
      background-color: #21262d;
      color: #8b949e;
    }

    button {
      width: 100%;
      margin-top: 15px;
      padding: 8px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    button:disabled {
      background-color: #30363d;
      color: #8b949e;
      cursor: not-allowed;
    }

    .submit-btn {
      background-color: #238636;
      color: white;
    }

    .secondary-btn {
      background-color: #2f81f7;
      color: white;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>회원가입</h2>
    <form id="signupForm">
      <label for="loginId">아이디</label>
      <input type="text" id="loginId" name="loginId" required />

      <label for="password">비밀번호</label>
      <input type="password" id="password" name="password" required />

      <label for="country">국가</label>
      <select id="country" name="country" required>
        <option value="">-- 국가 선택 --</option>
        <option value="KR">대한민국</option>
        <option value="US">미국</option>
        <option value="JP">일본</option>
      </select>

      <label for="email">이메일</label>
      <input type="email" id="email" name="email" required />
      <button type="button" class="secondary-btn" onclick="sendAuthCode()">이메일 인증 요청</button>

      <div id="authSection" style="display: none;">
        <label for="authCode">인증번호</label>
        <input type="text" id="authCode" name="authCode" />
        <button type="button" class="secondary-btn" onclick="verifyAuthCode()">인증번호 확인</button>
      </div>

      <button type="submit" class="submit-btn" id="submitBtn" disabled>회원가입</button>
    </form>
  </div>

  <script>
    let emailVerified = false;

    function sendAuthCode() {
      const email = document.getElementById("email").value;
      if (!email) {
        alert("이메일을 입력하세요.");
        return;
      }

      fetch("/auth-code", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email }),
      })
        .then(res => {
          if (!res.ok) throw new Error("요청 실패");
          alert("인증번호가 이메일로 전송되었습니다.");
          document.getElementById("authSection").style.display = "block";
        })
        .catch(() => alert("인증 요청 실패"));
    }

    function verifyAuthCode() {
      const email = document.getElementById("email").value;
      const authCode = document.getElementById("authCode").value;

      fetch("/auth-code/validate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, authCode }),
      })
        .then(res => {
          if (res.status === 200) {
            alert("이메일 인증이 완료되었습니다.");
            emailVerified = true;
            document.getElementById("submitBtn").disabled = false;
          } else {
            throw new Error("인증 실패");
          }
        })
        .catch(() => alert("인증번호가 올바르지 않습니다."));
    }

    document.getElementById("signupForm").addEventListener("submit", function (e) {
      e.preventDefault();
      if (!emailVerified) {
        alert("이메일 인증을 먼저 완료해주세요.");
        return;
      }

      const data = {
        loginId: document.getElementById("loginId").value,
        password: document.getElementById("password").value,
        country: document.getElementById("country").value,
      };

      fetch("/join", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data),
      })
        .then(res => {
          if (res.ok) {
            alert("회원가입이 완료되었습니다.");
            location.reload();
          } else {
            throw new Error("가입 실패");
          }
        })
        .catch(() => alert("회원가입 실패"));
    });
  </script>
</body>
</html>
